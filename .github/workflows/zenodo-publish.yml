name: Publish to Zenodo

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate metadata
        run: |
          echo "Validating .zenodo.json..."
          python3 -c "import json; json.load(open('.zenodo.json'))" || exit 1
          echo "Metadata OK."

      - name: Zip dataset
        run: |
          zip -r dataset.zip data/datasets/ data/sharded/
          echo "Dataset zipped: $(du -h dataset.zip | cut -f1)"

      - name: Create Zenodo deposition
        id: create
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            "https://zenodo.org/api/deposit/depositions" \
            -d '{}')
          echo "Create response: $RESPONSE"
          DEPOSITION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', 'UNKNOWN'))")
          BUCKET_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('links',{}).get('bucket', 'UNKNOWN'))")
          echo "deposition_id=$DEPOSITION_ID" >> "$GITHUB_OUTPUT"
          echo "bucket_url=$BUCKET_URL" >> "$GITHUB_OUTPUT"
          echo "Created deposition $DEPOSITION_ID, bucket: $BUCKET_URL"

      - name: Update deposition metadata
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          DEPOSITION_ID="${{ steps.create.outputs.deposition_id }}"
          METADATA=$(python3 -c "
          import json
          zenodo = json.load(open('.zenodo.json'))
          lic = zenodo.get('license', 'CC-BY-4.0')
          if isinstance(lic, dict):
              lic = lic.get('id', 'CC-BY-4.0')
          print(json.dumps({
              'metadata': {
                  'title': zenodo['title'],
                  'creators': zenodo['creators'],
                  'description': zenodo.get('description', ''),
                  'resource_type': {'type': 'dataset'},
                  'license': lic,
                  'keywords': zenodo.get('keywords', []),
                  'access_right': 'open'
              }
          }))")
          echo "Updating metadata: $METADATA"
          UPDATE_RESP=$(curl -s -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            "https://zenodo.org/api/deposit/depositions/$DEPOSITION_ID" \
            -d "$METADATA")
          echo "Update response: $UPDATE_RESP"

      - name: Upload dataset to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          BUCKET_URL="${{ steps.create.outputs.bucket_url }}"
          echo "Uploading to bucket: $BUCKET_URL"
          UPLOAD_RESP=$(curl -s -X PUT \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            --upload-file dataset.zip \
            "$BUCKET_URL/dataset.zip")
          echo "Upload response: $UPLOAD_RESP"

      - name: Publish deposition
        id: publish
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          DEPOSITION_ID="${{ steps.create.outputs.deposition_id }}"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            "https://zenodo.org/api/deposit/depositions/$DEPOSITION_ID/actions/publish")
          echo "Publish response: $RESPONSE"
          DOI=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('doi','UNKNOWN'))")
          DOI_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('doi_url','UNKNOWN'))")
          echo "doi=$DOI" >> "$GITHUB_OUTPUT"
          echo "doi_url=$DOI_URL" >> "$GITHUB_OUTPUT"

      - name: Print DOI
        run: |
          echo ""
          echo "========================================="
          echo "  Zenodo DOI:  ${{ steps.publish.outputs.doi }}"
          echo "  Zenodo URL:  ${{ steps.publish.outputs.doi_url }}"
          echo "========================================="
          echo ""
          echo "Next step: replace the PENDING placeholder in about.html:"
          echo "  Replace '10.5281/zenodo.PENDING' with '${{ steps.publish.outputs.doi }}'"
